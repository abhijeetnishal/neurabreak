# Hyperparameter configuration for NeuraBreak YOLO training
#
# These are the values passed to model.train() in train.py.
# Tweak these if training isn't converging or if you're on different hardware.
# See: https://docs.ultralytics.com/modes/train/#train-settings

# Core training
epochs: 150
imgsz: 640
batch: 16          # reduce to 8 if you get CUDA OOM errors
workers: 8
device: ""         # "" = auto-detect GPU, "cpu" = force CPU, "0" = first GPU

# Optimiser
optimizer: SGD
lr0: 0.01          # initial learning rate
lrf: 0.01          # final LR = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8

# Augmentation (critical for robustness across lighting / backgrounds)
hsv_h: 0.015       # hue  ± this fraction
hsv_s: 0.7         # saturation ± this fraction
hsv_v: 0.4         # brightness ± this fraction
degrees: 10.0      # rotation ± degrees
translate: 0.1     # translation ± fraction
scale: 0.5         # scale ± fraction
fliplr: 0.5        # horizontal flip probability (fine for webcam posture)
flipud: 0.0        # vertical flip — off (people don't appear upside down)
mosaic: 1.0        # mosaic augmentation probability
mixup: 0.1         # mixup probability
copy_paste: 0.0    # segment copy-paste (off for bounding box task)

# Regularisation
dropout: 0.1
label_smoothing: 0.0

# Transfer learning
freeze: 10         # freeze first N backbone layers to preserve COCO features
pretrained: true   # start from COCO pre-trained weights

# Early stopping & checkpointing
patience: 30       # stop if no mAP improvement for this many epochs
save_period: 10    # save checkpoint every N epochs
